<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant 3.4: Radial Web</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #controls { position: absolute; top: 10px; left: 10px; color: #555; font-family: monospace; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="controls">VARIANT 3.4: RADIAL WEB // SPIDERWEB INFILTRATION</div>
    <canvas id="canvas"></canvas>

    <script>
        /** CONFIGURATION **/
        const CONFIG = {
            numCircles: 20,         // Number of concentric rings
            numRadials: 40,         // Number of lines originating from center
            lineWidth: 2,           // Thickness of web paths
            speed: 5,               // Edges per frame
            bgLineColor: '#222',    // Faint uninvaded color
            activeLineColor: '#70e000', // Lime green / Web color
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let edges = []; // { n1, n2, x1, y1, x2, y2, weight, invaded }
        let invadedNodes = new Set();
        let boundaryEdges = [];
        let animationId;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            
            edges = [];
            invadedNodes.clear();
            boundaryEdges = [];

            const maxRadius = Math.max(width, height) / 1.5;
            const radiusStep = maxRadius / CONFIG.numCircles;
            const angleStep = (Math.PI * 2) / CONFIG.numRadials;

            // Generate nodes (r, a) where r is ring index, a is radial index
            // Edges connect (r, a) to (r+1, a) [radial] and (r, a) to (r, a+1) [circular]
            for (let r = 0; r < CONFIG.numCircles; r++) {
                for (let a = 0; a < CONFIG.numRadials; a++) {
                    const r1 = r * radiusStep;
                    const r2 = (r + 1) * radiusStep;
                    const a1 = a * angleStep;
                    const a2 = ((a + 1) % CONFIG.numRadials) * angleStep;

                    const x1 = centerX + Math.cos(a1) * r1;
                    const y1 = centerY + Math.sin(a1) * r1;
                    const x2 = centerX + Math.cos(a1) * r2;
                    const y2 = centerY + Math.sin(a1) * r2;
                    const x3 = centerX + Math.cos(a2) * r1;
                    const y3 = centerY + Math.sin(a2) * r1;

                    // Radial edge
                    edges.push({
                        id1: `${r},${a}`, id2: `${r+1},${a}`,
                        x1, y1, x2, y2,
                        weight: Math.random(), invaded: false
                    });

                    // Circular edge
                    if (r > 0) { // Don't bridge the center point multiple times
                        edges.push({
                            id1: `${r},${a}`, id2: `${r},${(a+1)%CONFIG.numRadials}`,
                            x1, y1, x2: x3, y2: y3,
                            weight: Math.random(), invaded: false
                        });
                    }
                }
            }

            // Start from center
            invadedNodes.add(`0,0`);
            updateBoundary();
            drawBackground();
            animate();
        }

        function updateBoundary() {
            boundaryEdges = edges.filter(e => {
                if (e.invaded) return false;
                const hasN1 = invadedNodes.has(e.id1);
                const hasN2 = invadedNodes.has(e.id2);
                return (hasN1 && !hasN2) || (!hasN1 && hasN2);
            });
        }

        function drawBackground() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = CONFIG.bgLineColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            edges.forEach(e => {
                ctx.moveTo(e.x1, e.y1);
                ctx.lineTo(e.x2, e.y2);
            });
            ctx.stroke();
        }

        function animate() {
            for (let s = 0; s < CONFIG.speed; s++) {
                if (boundaryEdges.length === 0) break;

                boundaryEdges.sort((a, b) => a.weight - b.weight);
                const nextEdge = boundaryEdges[0];
                
                nextEdge.invaded = true;
                invadedNodes.add(nextEdge.id1);
                invadedNodes.add(nextEdge.id2);
                
                ctx.strokeStyle = CONFIG.activeLineColor;
                ctx.lineWidth = CONFIG.lineWidth;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(nextEdge.x1, nextEdge.y1);
                ctx.lineTo(nextEdge.x2, nextEdge.y2);
                ctx.stroke();

                // Boundary check
                const ringIndex = Math.max(
                    parseInt(nextEdge.id1.split(',')[0]),
                    parseInt(nextEdge.id2.split(',')[0])
                );
                
                if (ringIndex >= CONFIG.numCircles - 1) {
                    cancelAnimationFrame(animationId);
                    setTimeout(init, 2000);
                    return;
                }

                updateBoundary();
            }
            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>

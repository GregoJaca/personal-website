<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant 2: Surface Tension</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #controls { position: absolute; top: 10px; left: 10px; color: #555; font-family: monospace; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="controls">V2: SURFACE TENSION // ORGANIC COHESION</div>
    <canvas id="canvas"></canvas>

    <script>
        /** CONFIGURATION **/
        const CONFIG = {
            latticeScale: 30,
            lineWidth: 3,
            growthSpeed: 8,
            tensionStrength: 0.8, // 0 to 1, how much neighbor count impacts weight
            colorRed: '#e63946',
            colorBlue: '#91B4CC',
            bgLineColor: '#222',
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, cols, rows, edges = [], redNodes = new Set(), blueNodes = new Set();
        let redBoundary = [], blueBoundary = [], isFull = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / CONFIG.latticeScale) + 1;
            rows = Math.ceil(height / CONFIG.latticeScale) + 1;
            edges = []; redNodes.clear(); blueNodes.clear(); isFull = false;
            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * CONFIG.latticeScale, y = j * CONFIG.latticeScale;
                    if (i < cols - 1) edges.push({ n1: `${i},${j}`, n2: `${i+1},${j}`, x1: x, y1: y, x2: x + CONFIG.latticeScale, y2: y, weight: Math.random(), state: 0 });
                    if (j < rows - 1) edges.push({ n1: `${i},${j}`, n2: `${i},${j+1}`, x1: x, y1: y, x2: x, y2: y + CONFIG.latticeScale, weight: Math.random(), state: 0 });
                }
            }
            redNodes.add(`${Math.floor(cols/2)},${Math.floor(rows/2)}`);
            blueNodes.add(`0,0`); blueNodes.add(`${cols-1},0`); blueNodes.add(`0,${rows-1}`); blueNodes.add(`${cols-1},${rows-1}`);
            updateBoundaries();
            animate();
        }

        function updateBoundaries() {
            redBoundary = []; blueBoundary = [];
            edges.forEach(e => {
                if (e.state !== 0) return;
                const r1 = redNodes.has(e.n1), r2 = redNodes.has(e.n2), b1 = blueNodes.has(e.n1), b2 = blueNodes.has(e.n2);
                
                // Tension heuristic: count how many neighbors have the same color
                const countRed = edges.filter(oe => oe !== e && oe.state === 1 && (oe.n1 === e.n1 || oe.n2 === e.n1 || oe.n1 === e.n2 || oe.n2 === e.n2)).length;
                const countBlue = edges.filter(oe => oe !== e && oe.state === 2 && (oe.n1 === e.n1 || oe.n2 === e.n1 || oe.n1 === e.n2 || oe.n2 === e.n2)).length;

                if ((r1 && !r2 && !blueNodes.has(e.n2)) || (r2 && !r1 && !blueNodes.has(e.n1))) {
                    e.effectiveWeightRed = e.weight * (1 - (countRed / 6) * CONFIG.tensionStrength);
                    redBoundary.push(e);
                }
                if ((b1 && !b2 && !redNodes.has(e.n2)) || (b2 && !b1 && !redNodes.has(e.n1))) {
                    e.effectiveWeightBlue = e.weight * (1 - (countBlue / 6) * CONFIG.tensionStrength);
                    blueBoundary.push(e);
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.lineWidth = 1; ctx.strokeStyle = CONFIG.bgLineColor;
            ctx.beginPath(); edges.forEach(e => { if (e.state === 0) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
            ctx.lineWidth = CONFIG.lineWidth; ctx.lineCap = 'round';
            ctx.strokeStyle = CONFIG.colorRed; ctx.beginPath(); edges.forEach(e => { if (e.state === 1) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
            ctx.strokeStyle = CONFIG.colorBlue; ctx.beginPath(); edges.forEach(e => { if (e.state === 2) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
        }

        function animate() {
            if (!isFull) {
                for (let s = 0; s < CONFIG.growthSpeed; s++) {
                    const r = redBoundary.sort((a,b)=>a.effectiveWeightRed-b.effectiveWeightRed)[0];
                    const b = blueBoundary.sort((a,b)=>a.effectiveWeightBlue-b.effectiveWeightBlue)[0];
                    if (r) { r.state = 1; redNodes.add(r.n1); redNodes.add(r.n2); }
                    if (b) { b.state = 2; blueNodes.add(b.n1); blueNodes.add(b.n2); }
                    if (!r && !b) isFull = true;
                    updateBoundaries();
                }
            } else {
                for (let i = 0; i < 5; i++) {
                    const victim = edges[Math.floor(Math.random() * edges.length)];
                    if (victim.state !== 0) victim.state = 0;
                }
                updateBoundaries();
                if (redBoundary.length > 0) redBoundary.sort((a,b)=>a.effectiveWeightRed-b.effectiveWeightRed)[0].state = 1;
                if (blueBoundary.length > 0) blueBoundary.sort((a,b)=>a.effectiveWeightBlue-b.effectiveWeightBlue)[0].state = 2;
            }
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>

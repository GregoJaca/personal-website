<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant 3.2: Honeycomb Lattice</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #controls { position: absolute; top: 10px; left: 10px; color: #555; font-family: monospace; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="controls">VARIANT 3.2: HONEYCOMB LATTICE // ORGANIC ANGLES</div>
    <canvas id="canvas"></canvas>

    <script>
        /** CONFIGURATION **/
        const CONFIG = {
            hexSize: 18,           // Circle radius of hexagon
            lineWidth: 2.5,        // Thickness of invading network
            speed: 3,             // Edges added per frame
            bgLineColor: '#222222', // Faint uninvaded color
            activeLineColor: '#00b4d8', // Invading line color
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let nodes = new Map(); // "q,r" -> { x, y, invaded: bool, neighbors: [] }
        let edges = [];        // { n1, n2, weight, invaded: bool }
        let boundaryEdges = [];
        let invadedNodes = new Set();
        let animationId;

        function getHexCoords(q, r) {
            const size = CONFIG.hexSize;
            const x = size * (3/2 * q);
            const y = size * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r);
            return { x, y };
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            nodes.clear();
            edges = [];
            invadedNodes.clear();
            boundaryEdges = [];

            const size = CONFIG.hexSize;
            const qCount = Math.ceil(width / (size * 1.5)) + 1;
            const rCount = Math.ceil(height / (size * Math.sqrt(3))) + 1;

            // Generate nodes in axial coordinates
            for (let q = -1; q < qCount; q++) {
                for (let r = -rCount; r < rCount; r++) {
                    const pos = getHexCoords(q, r);
                    if (pos.x < -size || pos.x > width + size || pos.y < -size || pos.y > height + size) continue;
                    
                    const id = `${q},${r}`;
                    nodes.set(id, { ...pos, id });
                }
            }

            // Create edges (neighbors)
            const directions = [[1, 0], [1, -1], [0, -1], [-1, 0], [-1, 1], [0, 1]];
            nodes.forEach(node => {
                const [q, r] = node.id.split(',').map(Number);
                directions.forEach(([dq, dr]) => {
                    const neighborId = `${q+dq},${r+dr}`;
                    if (nodes.has(neighborId)) {
                        const n2 = nodes.get(neighborId);
                        // Prevent duplicate edges
                        if (node.id < neighborId) {
                            edges.push({
                                n1: node, n2: n2,
                                weight: Math.random(),
                                invaded: false
                            });
                        }
                    }
                });
            });

            // Start from center closest node
            let centerNode = null;
            let minDist = Infinity;
            nodes.forEach(node => {
                const d = Math.hypot(node.x - width/2, node.y - height/2);
                if (d < minDist) {
                    minDist = d;
                    centerNode = node;
                }
            });

            invadedNodes.add(centerNode.id);
            updateBoundary();
            drawBackground();
            animate();
        }

        function updateBoundary() {
            boundaryEdges = edges.filter(e => {
                if (e.invaded) return false;
                const hasN1 = invadedNodes.has(e.n1.id);
                const hasN2 = invadedNodes.has(e.n2.id);
                return (hasN1 && !hasN2) || (!hasN1 && hasN2);
            });
        }

        function drawBackground() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = CONFIG.bgLineColor;
            ctx.lineWidth = 1;
            ctx.beginPath();
            edges.forEach(e => {
                ctx.moveTo(e.n1.x, e.n1.y);
                ctx.lineTo(e.n2.x, e.n2.y);
            });
            ctx.stroke();
        }

        function animate() {
            for (let s = 0; s < CONFIG.speed; s++) {
                if (boundaryEdges.length === 0) break;

                boundaryEdges.sort((a, b) => a.weight - b.weight);
                const nextEdge = boundaryEdges[0];
                
                nextEdge.invaded = true;
                invadedNodes.add(nextEdge.n1.id);
                invadedNodes.add(nextEdge.n2.id);
                
                ctx.strokeStyle = CONFIG.activeLineColor;
                ctx.lineWidth = CONFIG.lineWidth;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(nextEdge.n1.x, nextEdge.n1.y);
                ctx.lineTo(nextEdge.n2.x, nextEdge.n2.y);
                ctx.stroke();

                // Boundary check
                if (nextEdge.n1.x < 10 || nextEdge.n1.x > width - 10 || nextEdge.n1.y < 10 || nextEdge.n1.y > height - 10 ||
                    nextEdge.n2.x < 10 || nextEdge.n2.x > width - 10 || nextEdge.n2.y < 10 || nextEdge.n2.y > height - 10) {
                    cancelAnimationFrame(animationId);
                    setTimeout(init, 2000);
                    return;
                }

                updateBoundary();
            }
            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>

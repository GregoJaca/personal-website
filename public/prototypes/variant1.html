<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variant 1: Frontier Storms</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #controls { position: absolute; top: 10px; left: 10px; color: #555; font-family: monospace; font-size: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="controls">VARIANT 1: FRONTIER STORMS // DYNAMIC STEADY-STATE</div>
    <canvas id="canvas"></canvas>

    <script>
        /** CONFIGURATION **/
        const CONFIG = {
            latticeScale: 30,
            lineWidth: 3,
            growthSpeed: 8,
            stormFrequency: 2,     // How many storms per frame
            stormIntensity: 4,     // How many bonds to clear per storm
            stormRadius: 100,      // Range of the storm around its epicenter
            colorRed: '#e63946',
            colorBlue: '#91B4CC',
            bgLineColor: '#222',
        };

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, cols, rows, edges = [], redNodes = new Set(), blueNodes = new Set();
        let redBoundary = [], blueBoundary = [], isFull = false;

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            cols = Math.ceil(width / CONFIG.latticeScale) + 1;
            rows = Math.ceil(height / CONFIG.latticeScale) + 1;
            edges = []; redNodes.clear(); blueNodes.clear(); isFull = false;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const x = i * CONFIG.latticeScale, y = j * CONFIG.latticeScale;
                    if (i < cols - 1) edges.push({ n1: `${i},${j}`, n2: `${i+1},${j}`, x1: x, y1: y, x2: x + CONFIG.latticeScale, y2: y, weight: Math.random(), state: 0 });
                    if (j < rows - 1) edges.push({ n1: `${i},${j}`, n2: `${i},${j+1}`, x1: x, y1: y, x2: x, y2: y + CONFIG.latticeScale, weight: Math.random(), state: 0 });
                }
            }

            redNodes.add(`${Math.floor(cols/2)},${Math.floor(rows/2)}`);
            blueNodes.add(`0,0`); blueNodes.add(`${cols-1},0`); blueNodes.add(`0,${rows-1}`); blueNodes.add(`${cols-1},${rows-1}`);
            updateBoundaries();
            animate();
        }

        function updateBoundaries() {
            redBoundary = []; blueBoundary = [];
            edges.forEach(e => {
                if (e.state !== 0) return;
                const r1 = redNodes.has(e.n1), r2 = redNodes.has(e.n2), b1 = blueNodes.has(e.n1), b2 = blueNodes.has(e.n2);
                if ((r1 && !r2 && !blueNodes.has(e.n2)) || (r2 && !r1 && !blueNodes.has(e.n1))) redBoundary.push(e);
                if ((b1 && !b2 && !redNodes.has(e.n2)) || (b2 && !b1 && !redNodes.has(e.n1))) blueBoundary.push(e);
            });
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.lineWidth = 1; ctx.strokeStyle = CONFIG.bgLineColor;
            ctx.beginPath(); edges.forEach(e => { if (e.state === 0) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
            ctx.lineWidth = CONFIG.lineWidth; ctx.lineCap = 'round';
            ctx.strokeStyle = CONFIG.colorRed; ctx.beginPath(); edges.forEach(e => { if (e.state === 1) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
            ctx.strokeStyle = CONFIG.colorBlue; ctx.beginPath(); edges.forEach(e => { if (e.state === 2) { ctx.moveTo(e.x1, e.y1); ctx.lineTo(e.x2, e.y2); } }); ctx.stroke();
        }

        function animate() {
            if (!isFull) {
                // Initial growth: fill the board
                for (let s = 0; s < CONFIG.growthSpeed; s++) {
                    const r = redBoundary.sort((a,b)=>a.weight-b.weight)[0], b = blueBoundary.sort((a,b)=>a.weight-b.weight)[0];
                    if (r) { r.state = 1; redNodes.add(r.n1); redNodes.add(r.n2); }
                    if (b) { b.state = 2; blueNodes.add(b.n1); blueNodes.add(b.n2); }
                    if (!r && !b) { isFull = true; break; }
                    updateBoundaries();
                }
            } else {
                // FRONTIER STORMS: Only decay near the border
                for (let i = 0; i < CONFIG.stormFrequency; i++) {
                    // Identify frontier: bonds that are candidate for both or adjacent to both domains
                    const frontierBonds = edges.filter(e => e.state === 0 && (
                        (redNodes.has(e.n1) || redNodes.has(e.n2)) && 
                        (blueNodes.has(e.n1) || blueNodes.has(e.n2))
                    ));

                    if (frontierBonds.length > 0) {
                        const epicenter = frontierBonds[Math.floor(Math.random() * frontierBonds.length)];
                        const nearby = edges.filter(e => e.state !== 0 && Math.hypot((e.x1+e.x2)/2 - (epicenter.x1+epicenter.x2)/2, (e.y1+e.y2)/2 - (epicenter.y1+epicenter.y2)/2) < CONFIG.stormRadius);
                        
                        // Clear some bonds around epicenter
                        for(let j=0; j < CONFIG.stormIntensity; j++) {
                            if (nearby.length > 0) {
                                const victim = nearby[Math.floor(Math.random() * nearby.length)];
                                victim.state = 0;
                                victim.weight = Math.random(); 
                            }
                        }
                    }
                }
                
                // Active Refill: Both sides try to expand into new gaps
                updateBoundaries();
                for (let s = 0; s < 10; s++) {
                    if (redBoundary.length > 0) redBoundary.sort((a,b)=>a.weight-b.weight)[0].state = 1;
                    if (blueBoundary.length > 0) blueBoundary.sort((a,b)=>a.weight-b.weight)[0].state = 2;
                    updateBoundaries();
                }
            }
            draw();
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
